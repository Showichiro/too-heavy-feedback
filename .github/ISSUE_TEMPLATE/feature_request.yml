name: 機能要望・改善提案
description: 「こうだったらいいな」をざっくり書く。ふわっとした内容でOK。
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ふわっとした要望も歓迎です。1〜2 行でも構いません。
        雑談・議論ベースで話したい場合は [Discussions / Ideas](https://github.com/Showichiro/too-heavy-feedback/discussions/categories/ideas) もどうぞ。
  - type: textarea
    id: idea
    attributes:
      label: 内容
      description: どうなってほしいか / どんなことに困っているか、思いつくまま書いてください。
      placeholder: 例) 序盤がもう少し緊張感あると嬉しい / アイテムを並び替えたい / こういうイベントがあったら面白そう
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 補足 (任意)
      description: 画像・参考事例・関連する状況などあれば。
