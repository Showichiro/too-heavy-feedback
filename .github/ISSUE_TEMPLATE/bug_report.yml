name: バグ報告
description: 不具合・想定外の挙動を報告する
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ご報告ありがとうございます。再現できる範囲で書いてもらえれば十分です。
  - type: textarea
    id: detail
    attributes:
      label: 何が起きたか / 再現手順
      description: 起きた現象と、可能なら再現手順を書いてください。短くてOKです。
      placeholder: |
        例)
        水筒を捨てたら HP が回復してしまった。
        1. ゲーム開始 → 水筒2つ持った状態で 50m 進む
        2. 「捨てる」を押す
        → HP が 100 に戻る (期待: 変化なし)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 補足 (任意)
      description: バージョン・端末・ブラウザ・スクショ・コンソールエラーなど、分かる範囲で。
      placeholder: 例) v0.3.1 / iPhone Safari
